<div class="data-explorer">
  <div class="active-node-header card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center flex-wrap">
        <p class="actv-node mb-0">{{ title }}</p>
        <span class="last-updated" *ngIf="lastUpdated">Last updated {{ lastUpdated | date:'HH:mm:ss' }}</span>
      </div>
      <div class="float-end" *ngIf="showReloadButton">
        <button class="btn btn-infinity" (click)="onReload()" title="Reload data" [disabled]="spinning">
          {{ spinning ? 'Loading...' : 'Reload' }}
          <i class="bi bi-arrow-repeat" [class.spin]="spinning"></i>
        </button>
      </div>
    </div>
    <div class="card-body p-4">
      <!-- Loading State -->
      <div *ngIf="loading" class="text-center p-5">
        <div class="lds-ring"><div></div><div></div><div></div><div></div></div>
        <p class="mt-2">Loading data...</p>
      </div>

      <!-- Empty State -->
      <div *ngIf="!loading && data.length === 0" class="alert alert-warning">
        {{ emptyMessage }}
      </div>

      <!-- Data Table -->
      <div *ngIf="!loading && data.length > 0" class="table-responsive">
        <table class="table table-striped table-bordered dt-responsive nowrap">
          <thead>
            <tr>
              <th *ngFor="let column of columns">{{ column.label }}</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let row of data">
              <td *ngFor="let column of columns">
                <!-- If custom template is provided -->
                <ng-container *ngIf="column.template; else defaultCell">
                  <ng-container *ngTemplateOutlet="column.template; context: { $implicit: row, row: row }"></ng-container>
                </ng-container>
                <!-- Default cell rendering -->
                <ng-template #defaultCell>
                  {{ row[column.key] }}
                </ng-template>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination: « First · ‹ Prev · [window] · Next › · Last » -->
      <div class="d-flex justify-content-end mt-4" *ngIf="!loading && data.length > 0 && pagination">
        <nav aria-label="Page navigation">
          <ul class="pagination">
            <li class="page-item" [class.disabled]="!hasPrev()">
              <a class="page-link" href="javascript:void(0)" title="First page" (click)="onPageChange(1)">&laquo;</a>
            </li>
            <li class="page-item" [class.disabled]="!hasPrev()">
              <a class="page-link" href="javascript:void(0)" title="Previous page" (click)="onPageChange(currentPage - 1)">&lsaquo;</a>
            </li>
            <li class="page-item"
                *ngFor="let page of pages"
                [class.active]="currentPage === page">
              <a class="page-link" href="javascript:void(0)" (click)="onPageChange(page)">{{ page }}</a>
            </li>
            <li class="page-item" [class.disabled]="!hasNext()">
              <a class="page-link" href="javascript:void(0)" title="Next page" (click)="onPageChange(currentPage + 1)">&rsaquo;</a>
            </li>
            <li class="page-item" *ngIf="pagination.totalPages" [class.disabled]="!hasNext()">
              <a class="page-link" href="javascript:void(0)" title="Last page" (click)="onPageChange(pagination.totalPages!)">&raquo;</a>
            </li>
          </ul>
        </nav>
      </div>
    </div>
  </div>
</div>
