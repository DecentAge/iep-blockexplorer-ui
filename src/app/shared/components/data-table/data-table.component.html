<div class="data-explorer">
  <div class="active-node-header card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <p class="actv-node mb-0">{{ title }}</p>
      <div class="float-end" *ngIf="showReloadButton">
        <button class="btn btn-infinity" (click)="onReload()" title="Reload data" [disabled]="isReloading">
          {{ isReloading ? 'Loading...' : 'Reload' }}
          <i class="bi bi-arrow-repeat" [class.spin]="isReloading"></i>
        </button>
      </div>
    </div>
    <div class="card-body p-4">
      <!-- Loading State -->
      <div *ngIf="loading" class="text-center p-5">
        <div class="lds-ring"><div></div><div></div><div></div><div></div></div>
        <p class="mt-2">Loading data...</p>
      </div>

      <!-- Empty State -->
      <div *ngIf="!loading && data.length === 0" class="alert alert-warning">
        {{ emptyMessage }}
      </div>

      <!-- Data Table -->
      <div *ngIf="!loading && data.length > 0" class="table-responsive">
        <table class="table table-striped table-bordered dt-responsive nowrap">
          <thead>
            <tr>
              <th *ngFor="let column of columns">{{ column.label }}</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let row of data">
              <td *ngFor="let column of columns">
                <!-- If custom template is provided -->
                <ng-container *ngIf="column.template; else defaultCell">
                  <ng-container *ngTemplateOutlet="column.template; context: { $implicit: row, row: row }"></ng-container>
                </ng-container>
                <!-- Default cell rendering -->
                <ng-template #defaultCell>
                  {{ row[column.key] }}
                </ng-template>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination: « ‹ 1 … [window] … 100 › » -->
      <div class="d-flex justify-content-end mt-4" *ngIf="!loading && data.length > 0 && pagination">
        <nav aria-label="Page navigation">
          <ul class="pagination">
            <li class="page-item" [class.disabled]="!hasPrev()">
              <a class="page-link" href="javascript:void(0)" (click)="onPageChange(1)" aria-label="First">&laquo;</a>
            </li>
            <li class="page-item" [class.disabled]="!hasPrev()">
              <a class="page-link" href="javascript:void(0)" (click)="onPageChange(pagination.currentPage - 1)" aria-label="Previous">&lsaquo;</a>
            </li>
            <li class="page-item" *ngIf="showFirst()" [class.active]="pagination.currentPage === 1">
              <a class="page-link" href="javascript:void(0)" (click)="onPageChange(1)">1</a>
            </li>
            <li class="page-item disabled" *ngIf="showFirstEllipsis()">
              <span class="page-link">...</span>
            </li>
            <li class="page-item"
                *ngFor="let page of pagination.showPages || [1, 2, 3, 4, 5]"
                [class.active]="pagination.currentPage === page">
              <a class="page-link" href="javascript:void(0)" (click)="onPageChange(page)">
                {{ page }}
              </a>
            </li>
            <li class="page-item disabled" *ngIf="showEllipsis()">
              <span class="page-link">...</span>
            </li>
            <li class="page-item"
                *ngIf="showLast()"
                [class.active]="pagination.currentPage === pagination.totalPages">
              <a class="page-link" href="javascript:void(0)" (click)="onPageChange(pagination.totalPages!)">
                {{ pagination.totalPages }}
              </a>
            </li>
            <li class="page-item" [class.disabled]="!hasNext()">
              <a class="page-link" href="javascript:void(0)" (click)="onPageChange(pagination.currentPage + 1)" aria-label="Next">&rsaquo;</a>
            </li>
            <li class="page-item" [class.disabled]="!hasNext()">
              <a class="page-link" href="javascript:void(0)" (click)="onPageChange(pagination.totalPages!)" aria-label="Last">&raquo;</a>
            </li>
          </ul>
        </nav>
      </div>
    </div>
  </div>
</div>
